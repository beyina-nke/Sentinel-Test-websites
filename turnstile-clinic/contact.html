<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Evergreen Clinic Turnstile</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html"><span class="mark">E</span><span>Evergreen Clinic</span></a><nav class="nav"><a href="index.html">Home</a><a href="care.html">Care</a><a aria-current="page" href="contact.html">Contact</a></nav></div></header>
      <main class="section split">
        <section class="content">
          <h1>Contact Evergreen</h1>
          <p>This form uses Cloudflare Turnstile’s visible widget and official always-pass test sitekey.</p>
        </section>
        <section class="panel">
          <form class="contact-form" data-demo-form data-provider="Turnstile">
            <div class="field"><label for="ts-name">Name</label><input id="ts-name" name="name" required></div>
            <div class="field"><label for="ts-email">Email</label><input id="ts-email" name="email" type="email" required></div>
            <div class="field"><label for="ts-reason">Reason</label><select id="ts-reason" name="reason"><option>Appointment question</option><option>Records request</option><option>Billing question</option></select></div>
            <div class="field"><label for="ts-message">Message</label><textarea id="ts-message" name="message" required></textarea></div>
            <div class="captcha-slot"><div class="cf-turnstile" data-sitekey="1x00000000000000000000AA"></div></div>
            <button class="button" type="submit">Send request</button>
            <p class="status" data-status></p>
          </form>
        </section>
      </main>
      <footer class="footer"><div class="footer-inner"><a href="../index.html">Back to CAPTCHA demos</a></div></footer>
    </div>
    <script src="../assets/forms.js"></script>
  </body>
</html>
