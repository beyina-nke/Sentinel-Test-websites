<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Horizon Works reCAPTCHA</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html"><span class="mark">H</span><span>Horizon Works</span></a>
          <nav class="nav" aria-label="Horizon navigation">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a aria-current="page" href="contact.html">Contact</a>
          </nav>
        </div>
      </header>
      <main class="section split">
        <section class="content">
          <h1>Contact Horizon Works</h1>
          <p>This form uses the Google reCAPTCHA v2 checkbox widget. The demo key is Google’s public test site key, so replace it before production.</p>
        </section>
        <section class="panel" aria-label="Contact form">
          <form class="contact-form" data-demo-form data-provider="reCAPTCHA">
            <div class="field"><label for="name">Name</label><input id="name" name="name" autocomplete="name" required></div>
            <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required></div>
            <div class="field"><label for="message">Message</label><textarea id="message" name="message" required></textarea></div>
            <div class="captcha-slot"><div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div></div>
            <button class="button" type="submit">Send message</button>
            <p class="status" data-status></p>
          </form>
        </section>
      </main>
      <footer class="footer"><div class="footer-inner"><a href="../index.html">Back to CAPTCHA demos</a></div></footer>
    </div>
    <script src="../assets/forms.js"></script>
  </body>
</html>
